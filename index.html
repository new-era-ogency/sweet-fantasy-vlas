    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var mq = window.matchMedia("(prefers-reduced-motion: reduce)");
        if (mq.matches) {
          document.querySelectorAll(".js-reveal").forEach(function (el) {
            el.classList.remove("opacity-0"); el.style.opacity = "1";
          });
          return;
        }
        var io = new IntersectionObserver(
          function (entries, obs) {
            entries.forEach(function (entry) {
              if (!entry.isIntersecting) return;
              entry.target.classList.add("animate__animated", "animate__fadeInUp", "animate__slow");
              entry.target.classList.remove("opacity-0");
              obs.unobserve(entry.target);
            });
          },
          { threshold: 0.1, rootMargin: "0px 0px -10% 0px" },
        );
        document.querySelectorAll(".js-reveal").forEach(function (n) { io.observe(n); });

        var clusters = document.querySelectorAll(".sf-parallax-cluster");
        var coeffs = [0.038, -0.032, 0.026, -0.03, 0.021, -0.017];
        var parallaxScheduled = false;
        function applyParallax() {
          parallaxScheduled = false;
          var y = window.scrollY || window.pageYOffset || 0;
          clusters.forEach(function (el, i) {
            var k = coeffs[i % coeffs.length];
            var sway = Math.sin(y * 0.0008 + i * 1.6) * 14;
            el.style.transform = "translate3d(" + sway.toFixed(2) + "px," + (y * k).toFixed(2) + "px,0)";
          });
        }
        function onParallaxScroll() {
          if (!parallaxScheduled) {
            parallaxScheduled = true;
            requestAnimationFrame(applyParallax);
          }
        }
        window.addEventListener("scroll", onParallaxScroll, { passive: true });
        applyParallax();
      });
    </script>
  </body>
</html>
