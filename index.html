          <svg class="h-[22px] w-[22px] text-sf-blue" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.45" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" /></svg>
          <span class="font-display text-[9px] font-medium tracking-[0.18em] text-neutral-900 uppercase" x-text="t.touristBar.call"></span>
        </a>
        <a :href="mapsUrl" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center justify-center gap-1 bg-white py-3 text-neutral-900 transition active:bg-neutral-50">
          <svg class="h-[22px] w-[22px] text-sf-blue" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.45" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
          </svg>
          <span class="font-display text-[9px] font-medium tracking-[0.18em] text-neutral-900 uppercase" x-text="t.touristBar.map"></span>
        </a>
        <button type="button" class="flex flex-col items-center justify-center gap-1 bg-white py-3 text-neutral-900 transition active:bg-neutral-50" @click="openCake()">
          <span class="flex h-[22px] w-[22px] items-center justify-center rounded-full border border-sf-blue/40 text-[11px] font-display font-semibold tracking-tighter text-sf-blue">SF</span>
          <span class="font-display text-[9px] font-medium tracking-[0.16em] text-neutral-900 uppercase" x-text="t.touristBar.order"></span>
        </button>
      </nav>

      <div x-show="cakeModalOpen" x-cloak class="fixed inset-0 z-[160] overflow-y-auto px-4 py-10 sm:flex sm:items-center sm:justify-center sm:p-6" role="dialog" aria-modal="true" aria-labelledby="cake-modal-heading">
        <div x-show="cakeModalOpen" x-transition.enter="transition ease-[cubic-bezier(0.16,1,0.3,1)] duration-400" x-transition.enter-start="opacity-0" x-transition.enter-end="opacity-100" class="fixed inset-0 bg-neutral-950/50 backdrop-blur-[3px]" @click.self="closeCake()"></div>
        <div x-show="cakeModalOpen" x-transition.enter="transition ease-[cubic-bezier(0.16,1,0.3,1)] duration-500" x-transition.enter-start="opacity-0 translate-y-8 scale-[0.98]" x-transition.enter-end="opacity-100 translate-y-0 scale-100" class="relative z-10 mx-auto w-full max-w-md rounded-3xl border border-neutral-100/80 bg-white p-8 shadow-[0_32px_96px_-32px_rgba(15,23,42,0.28)] sm:max-w-[420px]">
          <div class="mb-9 flex items-start justify-between gap-6">
            <div>
              <p class="font-display text-[11px] font-medium tracking-[0.32em] text-neutral-400 uppercase" x-text="t.cakeModal.kicker"></p>
              <h3 id="cake-modal-heading" class="mt-4 font-display text-xl font-medium tracking-tight text-neutral-900 sm:text-[1.35rem]" x-text="t.cakeModal.title"></h3>
              <p class="mt-3 font-light leading-relaxed text-neutral-500" x-text="t.cakeModal.lede"></p>
            </div>
            <button type="button" class="rounded-full border border-neutral-100 p-2 text-neutral-400 transition hover:border-neutral-200 hover:bg-neutral-50 hover:text-neutral-900" @click="closeCake()" :aria-label="t.cakeModal.closeAria">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </div>
          <form class="grid gap-5" @submit.prevent="submitCakeOrder">
            <div class="grid gap-2"><label class="font-display text-[10px] font-medium tracking-[0.18em] text-neutral-900 uppercase" for="cake-name" x-text="t.cakeModal.labelName"></label><input id="cake-name" type="text" autocomplete="name" required class="w-full rounded-xl border border-neutral-200 px-4 py-3.5 font-sans text-sm text-neutral-800 outline-none transition focus:border-sf-blue focus:ring-2 focus:ring-sf-blue/20" x-model="cakeForm.name" /></div>
            <div class="grid gap-2 sm:grid-cols-2 sm:gap-4">
              <div class="grid gap-2"><label class="font-display text-[10px] font-medium tracking-[0.18em] text-neutral-900 uppercase" for="cake-email" x-text="t.cakeModal.labelEmail"></label><input id="cake-email" type="email" autocomplete="email" class="w-full rounded-xl border border-neutral-200 px-4 py-3.5 font-sans text-sm text-neutral-800 outline-none transition focus:border-sf-blue focus:ring-2 focus:ring-sf-blue/20" x-model="cakeForm.email" /></div>
              <div class="grid gap-2"><label class="font-display text-[10px] font-medium tracking-[0.18em] text-neutral-900 uppercase" for="cake-phone" x-text="t.cakeModal.labelPhone"></label><input id="cake-phone" type="tel" autocomplete="tel" class="w-full rounded-xl border border-neutral-200 px-4 py-3.5 font-sans text-sm text-neutral-800 outline-none transition focus:border-sf-blue focus:ring-2 focus:ring-sf-blue/20" x-model="cakeForm.phone" /></div>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="grid gap-2"><label class="font-display text-[10px] font-medium tracking-[0.18em] text-neutral-900 uppercase" for="cake-date" x-text="t.cakeModal.labelDate"></label><input id="cake-date" type="date" class="w-full rounded-xl border border-neutral-200 px-4 py-3.5 font-sans text-sm text-neutral-800 outline-none transition focus:border-sf-blue focus:ring-2 focus:ring-sf-blue/20" x-model="cakeForm.pickupDate" /></div>
              <div class="grid gap-2"><label class="font-display text-[10px] font-medium tracking-[0.18em] text-neutral-900 uppercase" for="cake-size" x-text="t.cakeModal.labelServings"></label><input id="cake-size" type="text" :placeholder="t.cakeModal.servingsPh" class="w-full rounded-xl border border-neutral-200 px-4 py-3.5 font-sans text-sm text-neutral-800 outline-none transition focus:border-sf-blue focus:ring-2 focus:ring-sf-blue/20" x-model="cakeForm.servings" /></div>
            </div>
            <div class="grid gap-2"><label class="font-display text-[10px] font-medium tracking-[0.18em] text-neutral-900 uppercase" for="cake-notes" x-text="t.cakeModal.labelNotes"></label><textarea id="cake-notes" rows="3" class="min-h-[7rem] w-full resize-y rounded-xl border border-neutral-200 px-4 py-3.5 font-sans text-sm text-neutral-800 outline-none transition focus:border-sf-blue focus:ring-2 focus:ring-sf-blue/20" x-model="cakeForm.notes"></textarea></div>
            <button type="submit" class="inline-flex min-h-[52px] w-full items-center justify-center rounded-full border border-sf-blue bg-sf-blue px-6 font-display text-[11px] font-medium tracking-[0.26em] text-white uppercase transition duration-500 hover:bg-[#085a82]" x-text="t.cakeModal.submit"></button>
            <p class="text-center font-sans text-xs font-light leading-relaxed text-neutral-400" x-text="t.cakeModal.note"></p>
          </form>
        </div>
      </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="./sweetfantasy-app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var mq = window.matchMedia("(prefers-reduced-motion: reduce)");
        if (mq.matches) {
          document.querySelectorAll(".js-reveal").forEach(function (el) {
            el.classList.remove("opacity-0"); el.style.opacity = "1";
          });
          return;
        }
        var io = new IntersectionObserver(
          function (entries, obs) {
            entries.forEach(function (entry) {
              if (!entry.isIntersecting) return;
              entry.target.classList.add("animate__animated", "animate__fadeInUp", "animate__slow");
              entry.target.classList.remove("opacity-0");
              obs.unobserve(entry.target);
            });
          },
          { threshold: 0.1, rootMargin: "0px 0px -10% 0px" },
        );
        document.querySelectorAll(".js-reveal").forEach(function (n) { io.observe(n); });
      });
    </script>
  </body>
